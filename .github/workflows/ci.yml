name: CI

on:
  push:
    branches-ignore:
      - main
      - release-temp

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      id: lint
      run: |
        npm run lint:json
        echo "lint_exit_code=$?" >> "$GITHUB_OUTPUT"
      continue-on-error: true

    - name: Report ESLint problems with reviewdog
      uses: reviewdog/action-eslint@v1
      continue-on-error: true
      with:
        reporter: github-pr-review
        github_token: ${{ secrets.GITHUB_TOKEN }}
        eslint_flags: '. -f json -o eslint-report.json'

    - name: Run tests with coverage
      id: test
      run: |
        npm run test:coverage
        echo "test_exit_code=$?" >> "$GITHUB_OUTPUT"

    - name: Fail if lint or tests failed
      run: |
        if [ "${{ steps.lint.outputs.exit_code }}" != "0" ] || [ "${{ steps.tests.outputs.exit_code }}" != "0" ]; then
          echo "❌ Lint or tests failed"
          exit 1
        else
          echo "✅ Lint and tests passed"
        fi

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/lcov.info
        fail_ci_if_error: false
